[pytest]
pythonpath = .
markers =
    gcp: tests that run against real GCP services (requires auth and .env with CLOUD_SQL_*, GCS_BUCKET)
env =
    GCP_PROJECT_ID=gcp-rag-poc-490814
    POSTGRES_USER=rag
    POSTGRES_PASSWORD=rag
    POSTGRES_DB=regional
