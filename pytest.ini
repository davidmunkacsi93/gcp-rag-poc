[pytest]
pythonpath = .
filterwarnings =
    ignore::UserWarning:vertexai
markers =
    gcp: tests that run against real GCP services (requires auth and .env with CLOUD_SQL_*, GCS_BUCKET)
    integration: tests that run against local emulators (Firestore, GCS, BigQuery)
env =
    D:GCP_PROJECT_ID=gcp-rag-poc
    D:POSTGRES_USER=rag
    D:POSTGRES_PASSWORD=rag
    D:POSTGRES_DB=regional
    D:POSTGRES_HOST=localhost
    D:POSTGRES_PORT=5432
    D:GCS_EMULATOR_HOST=http://localhost:4443
    D:GCS_DOCUMENTS_BUCKET=rag-poc-documents-dev
    D:BIGQUERY_EMULATOR_HOST=http://localhost:9050
    D:BIGQUERY_DATASET=global_metrics
    D:STORAGE_EMULATOR_HOST=localhost:4443
    D:FIRESTORE_EMULATOR_HOST=localhost:8090
