[pytest]
pythonpath = .
filterwarnings =
    ignore::UserWarning:vertexai
markers =
    gcp: tests that run against real GCP services (requires auth and .env with CLOUD_SQL_*, GCS_BUCKET)
    integration: tests that run against local emulators (Firestore, GCS, BigQuery)
env =
    GCP_PROJECT_ID=gcp-rag-poc
    POSTGRES_USER=rag
    POSTGRES_PASSWORD=rag
    POSTGRES_DB=regional
    POSTGRES_HOST=localhost
    POSTGRES_PORT=5432
    GCS_EMULATOR_HOST=http://localhost:4443
    D:GCS_DOCUMENTS_BUCKET=rag-poc-documents-dev
    BIGQUERY_EMULATOR_HOST=http://localhost:9050
    BIGQUERY_DATASET=global_metrics
    STORAGE_EMULATOR_HOST=localhost:4443
    FIRESTORE_EMULATOR_HOST=localhost:8090
