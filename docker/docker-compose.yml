services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-regional}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443", "-external-url", "http://localhost:4443"]
    volumes:
      - gcs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    platform: linux/amd64
    ports:
      - "9050:9050"
      - "9060:9060"
    command: ["--project", "${GCP_PROJECT_ID:-gcp-rag-poc}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9050/discovery/v1/apis/bigquery/v2/rest || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  gcs_data:
