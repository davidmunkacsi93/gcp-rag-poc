name: gcp-rag-poc

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-regional}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-regional}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443", "-external-url", "http://localhost:4443"]
    volumes:
      - gcs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    platform: linux/amd64
    ports:
      - "9050:9050"
      - "9060:9060"
    command: ["--project", "${GCP_PROJECT_ID:-gcp-rag-poc}"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9050' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    ports:
      - "8090:8090"
    command: ["gcloud", "emulators", "firestore", "start", "--host-port=0.0.0.0:8090"]
    environment:
      FIRESTORE_EMULATOR_HOST: firestore:8090
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8090' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  retrieval-service:
    build:
      context: ..
      dockerfile: src/retrieval/Dockerfile
    ports:
      - "8081:8080"
    environment:
      FIRESTORE_EMULATOR_HOST: firestore:8090
      BIGQUERY_EMULATOR_HOST: http://bigquery-emulator:9050
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-regional}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-gcp-rag-poc}
      EMBEDDING_MODEL: stub
    depends_on:
      firestore:
        condition: service_healthy
      bigquery-emulator:
        condition: service_healthy
      postgres:
        condition: service_healthy

  generation-service:
    build:
      context: ..
      dockerfile: src/generation/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8080
      FIRESTORE_EMULATOR_HOST: firestore:8090
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-gcp-rag-poc}
      GENERATION_STUB: "true"
      EMBEDDING_MODEL: stub
    depends_on:
      retrieval-service:
        condition: service_started
      firestore:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: src/frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      GENERATION_SERVICE_URL: http://generation-service:8080
    depends_on:
      generation-service:
        condition: service_started

volumes:
  postgres_data:
  gcs_data:
